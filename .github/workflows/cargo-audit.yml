name: cargo-audit

# Scans the dependency tree against the RustSec advisory database. Runs on
# every push and PR, plus weekly so a newly disclosed advisory against an
# already-pinned dependency surfaces even without a code change.

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/cargo-audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/cargo-audit.yml"
  schedule:
    - cron: "42 6 * * 1"
  workflow_dispatch:

concurrency:
  group: cargo-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: RustSec advisory scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit@0.22.2

      - name: Audit dependencies
        run: cargo audit --deny warnings
