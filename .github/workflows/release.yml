name: Release

# Builds standalone grackle binaries for Linux, macOS, and Windows and attaches
# them to the GitHub Release. Trigger by publishing a release for a tag, or run
# manually (workflow_dispatch) to smoke-test the build without uploading.
#
# Provenance: SLSA Build L3 via slsa-github-generator's generic generator
# (trusted reusable workflow), covering every release archive. A CycloneDX
# SBOM is generated from the Cargo dependency graph and, along with the
# archives, signed with Sigstore.
#
# Release flow:
#   1. Merge to main.
#   2. git tag -a v0.1.0 -m "Release 0.1.0" && git push origin v0.1.0
#   3. GitHub -> Releases -> Draft a new release -> pick the tag -> Publish.
#
#   build (per target) -> aggregate-hashes -> provenance (SLSA L3)
#                      \-> sign-and-attest (SBOM + Sigstore -> release)

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    outputs:
      hashes-x86_64-unknown-linux-gnu: ${{ steps.hash.outputs.hashes-x86_64-unknown-linux-gnu }}
      hashes-aarch64-unknown-linux-gnu: ${{ steps.hash.outputs.hashes-aarch64-unknown-linux-gnu }}
      hashes-aarch64-apple-darwin: ${{ steps.hash.outputs.hashes-aarch64-apple-darwin }}
      hashes-x86_64-apple-darwin: ${{ steps.hash.outputs.hashes-x86_64-apple-darwin }}
      hashes-x86_64-pc-windows-msvc: ${{ steps.hash.outputs.hashes-x86_64-pc-windows-msvc }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: x86_64-pc-windows-msvc
            runner: windows-2022

    steps:
      - name: Harden Runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --target ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Smoke test the binary
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/grackle"
          [ "${{ runner.os }}" = "Windows" ] && bin="${bin}.exe"
          # A cross-compiled binary whose arch differs from the runner host cannot
          # execute here: aarch64 Linux on the amd64 runner, and x86_64 macOS on the
          # arm64 macos-14 runner. Skip the run in those cases; build success is the
          # gate, and the matching native target still exercises --self-test.
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu) host_arch=x86_64 ;;
            x86_64-apple-darwin) host_arch=arm64 ;;
            *) host_arch="" ;;
          esac
          if [ -n "$host_arch" ] && [ "$(uname -m)" = "$host_arch" ]; then
            echo "skipping run of cross-built $bin on $(uname -m)"
          else
            "$bin" --self-test
            "$bin" --list-rules >/dev/null
          fi

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-dev}"
          name="grackle-${version}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp README.md LICENSE "dist/${name}/" 2>/dev/null || cp README.md "dist/${name}/"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/grackle.exe" "dist/${name}/"
            (cd dist && 7z a "${name}.zip" "${name}" >/dev/null)
            echo "asset=dist/${name}.zip" >> "$GITHUB_OUTPUT"
          else
            cp "target/${{ matrix.target }}/release/grackle" "dist/${name}/"
            (cd dist && tar czf "${name}.tar.gz" "${name}")
            echo "asset=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Checksum
        shell: bash
        run: |
          set -euo pipefail
          asset="${{ steps.package.outputs.asset }}"
          if command -v sha256sum >/dev/null; then
            sha256sum "$asset" | awk '{print $1}' > "${asset}.sha256"
          else
            shasum -a 256 "$asset" | awk '{print $1}' > "${asset}.sha256"
          fi

      - name: Generate sha256 subject for SLSA provenance
        id: hash
        shell: bash
        run: |
          set -euo pipefail
          asset="${{ steps.package.outputs.asset }}"
          dir=$(dirname "$asset")
          base=$(basename "$asset")
          cd "$dir"
          if command -v sha256sum >/dev/null; then
            subject=$(sha256sum "$base" | base64 | tr -d '\n')
          else
            subject=$(shasum -a 256 "$base" | base64 | tr -d '\n')
          fi
          echo "hashes-${{ matrix.target }}=${subject}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: grackle-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.asset }}.sha256
          if-no-files-found: error

  aggregate-hashes:
    name: Aggregate provenance subjects
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.combine.outputs.hashes }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Combine sha256 subjects
        id: combine
        env:
          H_LINUX_X64: ${{ needs.build.outputs.hashes-x86_64-unknown-linux-gnu }}
          H_LINUX_ARM64: ${{ needs.build.outputs.hashes-aarch64-unknown-linux-gnu }}
          H_MAC_ARM64: ${{ needs.build.outputs.hashes-aarch64-apple-darwin }}
          H_MAC_X64: ${{ needs.build.outputs.hashes-x86_64-apple-darwin }}
          H_WIN_X64: ${{ needs.build.outputs.hashes-x86_64-pc-windows-msvc }}
        run: |
          set -euo pipefail
          merged=$({
            echo "$H_LINUX_X64" | base64 -d
            echo "$H_LINUX_ARM64" | base64 -d
            echo "$H_MAC_ARM64" | base64 -d
            echo "$H_MAC_X64" | base64 -d
            echo "$H_WIN_X64" | base64 -d
          } | base64 -w0)
          echo "hashes=$merged" >> "$GITHUB_OUTPUT"

  provenance:
    name: SLSA L3 provenance
    needs: aggregate-hashes
    if: github.event_name == 'release'
    permissions:
      actions: read
      id-token: write
      contents: write
    # Pinned by semver tag (not SHA) by design: slsa-verifier binds the
    # trusted-builder identity to this tag via the OIDC claim.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.aggregate-hashes.outputs.hashes }}"
      provenance-name: "${{ github.event.release.tag_name }}.intoto.jsonl"
      upload-assets: true

  sign-and-attest:
    name: SBOM, sign, and attach
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install cargo-cyclonedx
        run: cargo install --locked cargo-cyclonedx@0.5.9

      - name: Generate CycloneDX SBOM
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || 'sbom' }}
        run: |
          set -euo pipefail
          mkdir -p sbom
          cargo cyclonedx --format json --spec-version 1.5 --all
          # cargo-cyclonedx writes <crate>.cdx.json next to each manifest.
          cdx=$(ls ./*.cdx.json | head -n1)
          mv "$cdx" "sbom/${RELEASE_TAG}.cdx.json"

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: grackle-*
          merge-multiple: true
          path: dist/

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1  # v3.4.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.zip ./sbom/*.cdx.json

      - name: Attach signed artifacts, SBOM, and signatures to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" \
            dist/*.tar.gz \
            dist/*.zip \
            dist/*.sha256 \
            dist/*.sigstore.json \
            sbom/*.cdx.json \
            sbom/*.sigstore.json \
            --clobber

  publish-crate:
    name: Publish to crates.io
    needs: sign-and-attest
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  bump-tap:
    name: Bump Homebrew tap
    needs: sign-and-attest
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: homebrew-tap
      url: https://github.com/cpeoples/homebrew-tap/pulls
    permissions:
      contents: read
    env:
      VERSION: ${{ github.event.release.tag_name }}
      FORMULA_PATH: Formula/grackle.rb

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: cpeoples/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          persist-credentials: false

      - name: Rewrite formula from release checksums
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          mkdir -p checksums
          gh release download "$VERSION" --repo cpeoples/grackle \
            --pattern "*.tar.gz.sha256" --dir checksums
          python3 - <<'PY'
          import os, re, pathlib
          version = os.environ["VERSION"].lstrip("v")
          tag = os.environ["VERSION"]
          targets = [
              "aarch64-apple-darwin",
              "x86_64-apple-darwin",
              "aarch64-unknown-linux-gnu",
              "x86_64-unknown-linux-gnu",
          ]
          sha = {}
          for t in targets:
              p = pathlib.Path("checksums") / f"grackle-{tag}-{t}.tar.gz.sha256"
              sha[t] = p.read_text().split()[0]
          path = pathlib.Path(os.environ["FORMULA_PATH"])
          src = path.read_text()
          src = re.sub(r'^(\s*version\s+)"[^"]+"', rf'\g<1>"{version}"', src, count=1, flags=re.M)
          for t in targets:
              src = re.sub(
                  rf'(grackle-v[^"/]+-{re.escape(t)}\.tar\.gz"\n\s*sha256\s+)"[0-9a-f]{{64}}"',
                  rf'\g<1>"{sha[t]}"',
                  src,
              )
          src = re.sub(r'/download/v[^/]+/grackle-v[^-]+-', f'/download/{tag}/grackle-{tag}-', src)
          path.write_text(src)
          PY

      - name: Open pull request on tap
        id: pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          commit-message: "grackle ${{ env.VERSION }}"
          title: "grackle ${{ env.VERSION }}"
          body: |
            Automated bump triggered by ${{ env.VERSION }} on cpeoples/grackle.
          branch: bump-grackle-${{ env.VERSION }}
          delete-branch: true
          add-paths: ${{ env.FORMULA_PATH }}
          sign-commits: true

      - name: Enable auto-merge
        if: steps.pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          PR: ${{ steps.pr.outputs.pull-request-number }}
        run: gh pr merge "$PR" --repo cpeoples/homebrew-tap --auto --squash --delete-branch

  publish-snap:
    name: Publish to Snap Store
    needs: sign-and-attest
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: snapcraft
      url: https://snapcraft.io/grackle
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # full history + tags so `git describe` resolves the version
          persist-credentials: false

      - name: Resolve snap version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: printf '%s' "${RELEASE_TAG#v}" > snap/.version

      - name: Build snap
        id: build
        uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79  # v1.3.0

      - name: Publish to stable
        uses: snapcore/action-publish@214b86e5ca036ead1668c79afb81e550e6c54d40  # v1.2.0
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable

